{% extends "base.html" %}
{% load static %}

{% block title %}Academic Performance - GLIDE Institute{% endblock %}

{% block content %}
<style>
    .report-page {
        padding: 30px 0 60px;
        background: #f0f4f8;
        min-height: 100vh;
    }

    .report-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, #1a2f4e 100%);
        padding: 30px 35px;
        border-radius: 15px;
        color: white;
        margin-bottom: 30px;
    }
    .report-header h3 { color: white; margin: 0; font-weight: 700; }
    .report-header h3 i { color: var(--secondary-color); margin-right: 12px; }
    .report-header .subtitle { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 5px; }
    .report-header .btn-white {
        background: white; color: var(--primary-color); padding: 8px 22px;
        border-radius: 50px; font-weight: 600; border: none; transition: all 0.3s ease;
    }
    .report-header .btn-white:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }

    .report-section {
        background: white;
        border-radius: 15px;
        padding: 25px 30px;
        margin-bottom: 25px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.04);
    }
    .report-section .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #f0f0f0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .report-section .section-title i { color: var(--secondary-color); font-size: 20px; }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }
    .stat-box {
        background: var(--light-bg);
        border-radius: 12px;
        padding: 18px 20px;
        text-align: center;
    }
    .stat-box .number { font-size: 28px; font-weight: 700; color: var(--primary-color); }
    .stat-box .label { font-size: 13px; color: var(--text-color); margin: 0; }

    .table-responsive { overflow-x: auto; }
    .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    .table thead th {
        background: var(--light-bg);
        padding: 10px 12px;
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-color);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 2px solid var(--border-color);
    }
    .table tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-dark);
    }
    .table tbody tr:hover { background: var(--light-bg); }

    .grade-badge {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 5px;
        font-weight: 700;
        font-size: 14px;
        min-width: 40px;
        text-align: center;
    }
    .grade-badge.A { background: #28a745; color: white; }
    .grade-badge.Bplus { background: #17a2b8; color: white; }
    .grade-badge.B { background: #5bc0de; color: white; }
    .grade-badge.Cplus { background: #ffc107; color: #212529; }
    .grade-badge.C { background: #fd7e14; color: white; }
    .grade-badge.D { background: #6c757d; color: white; }
    .grade-badge.F { background: #dc3545; color: white; }

    .progress-custom {
        height: 24px;
        border-radius: 12px;
        background: #f0f0f0;
        overflow: hidden;
        position: relative;
    }
    .progress-custom .progress-bar {
        height: 100%;
        border-radius: 12px;
        transition: width 1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        color: white;
    }

    @media (max-width: 768px) {
        .report-header { padding: 20px; text-align: center; }
        .report-section { padding: 15px; }
        .stat-grid { grid-template-columns: 1fr 1fr; }
        .stat-box .number { font-size: 22px; }
    }
    @media (max-width: 480px) {
        .stat-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="report-page">
    <div class="container">
        <!-- Header -->
        <div class="report-header">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h3><i class="icofont-chart-line"></i> Academic Performance Report</h3>
                    <p class="subtitle" id="report-date">Loading...</p>
                </div>
                <div class="col-md-4 text-md-right mt-3 mt-md-0">
                    <button class="btn btn-white" onclick="window.print()"><i class="icofont-print"></i> Print</button>
                    <button class="btn btn-white ml-2" onclick="exportReport()"><i class="icofont-file-excel"></i> Export</button>
                </div>
            </div>
        </div>

        <div id="report-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading academic performance data...</p>
            </div>
        </div>
    </div>
</div>

<script>
    function checkSession() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user || !user.id) {
            localStorage.clear();
            window.location.href = '/login/';
            return false;
        }
        return true;
    }

    function handleResponse(response) {
        if (response.status === 403) {
            return Promise.resolve({ results: [], count: 0 });
        }
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (!checkSession()) return;

        document.getElementById('report-date').textContent = 'Generated: ' + new Date().toLocaleString();

        fetch('/api/reports/academic-performance/', { credentials: 'include' })
        .then(handleResponse)
        .then(data => {
            renderReport(data);
        })
        .catch(error => {
            console.error('Error loading report:', error);
            document.getElementById('report-container').innerHTML = `
                <div class="report-section text-center py-5">
                    <h4 class="text-danger"><i class="icofont-warning"></i> Error Loading Report</h4>
                    <p class="text-muted">${error.message}</p>
                    <button class="btn btn-main mt-3" onclick="location.reload()">Retry</button>
                </div>
            `;
        });
    });

    function renderReport(data) {
        const container = document.getElementById('report-container');

        const gradeDistribution = data.grade_distribution || [];
        const totalResults = data.total_results || 0;
        
        const passGrades = ['A', 'B+', 'B', 'C+', 'C', 'D'];
        const passed = gradeDistribution
            .filter(g => passGrades.includes(g.grade))
            .reduce((sum, g) => sum + (g.count || 0), 0);
        const failed = gradeDistribution
            .filter(g => g.grade === 'F')
            .reduce((sum, g) => sum + (g.count || 0), 0);
        
        const passRate = totalResults > 0 ? Math.round((passed / totalResults) * 100) : 0;
        const failRate = totalResults > 0 ? Math.round((failed / totalResults) * 100) : 0;

        const gradeColors = {
            'A': '#28a745',
            'B+': '#17a2b8',
            'B': '#5bc0de',
            'C+': '#ffc107',
            'C': '#fd7e14',
            'D': '#6c757d',
            'F': '#dc3545'
        };

        const gradeDisplay = {
            'A': 'A',
            'B+': 'Bplus',
            'B': 'B',
            'C+': 'Cplus',
            'C': 'C',
            'D': 'D',
            'F': 'F'
        };

        container.innerHTML = `
            <!-- Summary Stats -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-chart-bar-graph"></i> Performance Overview</div>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="number">${totalResults}</div>
                        <p class="label">Total Results</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: #28a745;">${data.average_score ? data.average_score.toFixed(1) : '0.0'}</div>
                        <p class="label">Average Score (%)</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: #28a745;">${passRate}%</div>
                        <p class="label">Pass Rate</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: #dc3545;">${failRate}%</div>
                        <p class="label">Fail Rate</p>
                    </div>
                </div>
            </div>

            <!-- Grade Distribution -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-pie-chart"></i> Grade Distribution</div>
                ${gradeDistribution && gradeDistribution.length > 0 ? `
                    <div style="margin-bottom: 20px;">
                        ${gradeDistribution.map(g => {
                            const percentage = totalResults > 0 ? Math.round((g.count / totalResults) * 100) : 0;
                            const color = gradeColors[g.grade] || '#6c757d';
                            const displayGrade = gradeDisplay[g.grade] || g.grade;
                            return `
                                <div style="margin-bottom: 8px;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;">
                                        <span style="font-weight: 600; font-size: 14px;">
                                            <span class="grade-badge ${displayGrade}">${g.grade}</span>
                                            <span style="margin-left: 8px; color: var(--text-color);">${g.count || 0} students</span>
                                        </span>
                                        <span style="font-weight: 600; color: var(--primary-color);">${percentage}%</span>
                                    </div>
                                    <div class="progress-custom">
                                        <div class="progress-bar" style="width: ${percentage}%; background: ${color};">
                                            ${percentage > 5 ? percentage + '%' : ''}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Grade</th>
                                    <th>Count</th>
                                    <th>Percentage</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${gradeDistribution.map(g => {
                                    const percentage = totalResults > 0 ? Math.round((g.count / totalResults) * 100) : 0;
                                    const displayGrade = gradeDisplay[g.grade] || g.grade;
                                    return `
                                        <tr>
                                            <td><span class="grade-badge ${displayGrade}">${g.grade}</span></td>
                                            <td><strong>${g.count || 0}</strong></td>
                                            <td>${percentage}%</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                ` : '<p class="text-muted">No grade data available</p>'}
            </div>

            <!-- By Course -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-book"></i> Performance by Course</div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Course Name</th>
                                <th>Students</th>
                                <th>Avg Score</th>
                                <th>Pass Rate</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.by_course && data.by_course.length > 0 ?
                                data.by_course.map(c => {
                                    const passRateCourse = c.student_count > 0 ? Math.round((c.passed_count || 0) / c.student_count * 100) : 0;
                                    return `
                                        <tr>
                                            <td><strong>${c.name || 'N/A'}</strong></td>
                                            <td>${c.student_count || 0}</td>
                                            <td><strong>${c.avg_score ? c.avg_score.toFixed(1) : '0.0'}%</strong></td>
                                            <td>
                                                <div style="display: flex; align-items: center; gap: 10px;">
                                                    <span>${passRateCourse}%</span>
                                                    <div class="progress-custom" style="flex: 1; height: 16px;">
                                                        <div class="progress-bar" style="width: ${passRateCourse}%; background: ${passRateCourse >= 70 ? '#28a745' : passRateCourse >= 50 ? '#ffc107' : '#dc3545'};">
                                                            ${passRateCourse > 10 ? passRateCourse + '%' : ''}
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('') :
                                '<tr><td colspan="4" class="text-center text-muted">No course data available</td></tr>'
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function exportReport() {
        alert('Export functionality will be available soon.');
    }
</script>
{% endblock %}
