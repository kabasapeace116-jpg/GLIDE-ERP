{% extends "base.html" %}
{% load static %}

{% block title %}Student Statistics - GLIDE Institute{% endblock %}

{% block content %}
<style>
    .report-page {
        padding: 30px 0 60px;
        background: #f0f4f8;
        min-height: 100vh;
    }
    .report-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, #1a2f4e 100%);
        padding: 30px 35px;
        border-radius: 15px;
        color: white;
        margin-bottom: 30px;
    }
    .report-header h3 { color: white; margin: 0; font-weight: 700; }
    .report-header h3 i { color: var(--secondary-color); margin-right: 12px; }
    .report-header .subtitle { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 5px; }
    .report-header .btn-white { background: white; color: var(--primary-color); padding: 8px 22px; border-radius: 50px; font-weight: 600; border: none; transition: all 0.3s ease; font-size: 14px; }
    .report-header .btn-white:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }

    .report-section {
        background: white;
        border-radius: 15px;
        padding: 25px 30px;
        margin-bottom: 25px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.04);
    }
    .report-section .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #f0f0f0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .report-section .section-title i { color: var(--secondary-color); font-size: 20px; }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }
    .stat-box {
        background: var(--light-bg);
        border-radius: 12px;
        padding: 18px 20px;
        text-align: center;
    }
    .stat-box .number { font-size: 28px; font-weight: 700; color: var(--primary-color); }
    .stat-box .label { font-size: 13px; color: var(--text-color); margin: 0; }

    .table-responsive { overflow-x: auto; }
    .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    .table thead th {
        background: var(--light-bg);
        padding: 10px 12px;
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-color);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 2px solid var(--border-color);
    }
    .table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-dark); }
    .table tbody tr:hover { background: var(--light-bg); }

    .progress-custom {
        height: 20px;
        border-radius: 10px;
        background: #f0f0f0;
        overflow: hidden;
        position: relative;
    }
    .progress-custom .progress-bar {
        height: 100%;
        border-radius: 10px;
        transition: width 1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: white;
    }

    .badge-status {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
    }
    .badge-status.active { background: #e8f5e9; color: #1b5e20; }
    .badge-status.inactive { background: #ffebee; color: #b71c1c; }
    .badge-status.graduated { background: #e3f2fd; color: #0d47a1; }
    .badge-status.suspended { background: #fff3e0; color: #e65100; }

    @media (max-width: 768px) {
        .report-header { padding: 20px; text-align: center; }
        .report-section { padding: 15px; }
        .stat-grid { grid-template-columns: 1fr 1fr; }
        .stat-box .number { font-size: 22px; }
    }
    @media (max-width: 480px) {
        .stat-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="report-page">
    <div class="container">
        <div class="report-header">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h3><i class="icofont-graduate"></i> Student Statistics Report</h3>
                    <p class="subtitle" id="report-date">Loading...</p>
                </div>
                <div class="col-md-4 text-md-right mt-3 mt-md-0">
                    <button class="btn btn-white" onclick="window.print()"><i class="icofont-print"></i> Print</button>
                    <button class="btn btn-white ml-2" onclick="exportReport()"><i class="icofont-file-excel"></i> Export</button>
                </div>
            </div>
        </div>

        <div id="report-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading student statistics...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // SESSION CHECK
    // ============================================
    function checkSession() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user || !user.id) {
            localStorage.clear();
            window.location.href = '/login/';
            return false;
        }
        return true;
    }

    // ============================================
    // HANDLE RESPONSE
    // ============================================
    function handleResponse(response) {
        if (response.status === 403) {
            return Promise.resolve({ results: [], count: 0 });
        }
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (!checkSession()) return;

        document.getElementById('report-date').textContent = 'Generated: ' + new Date().toLocaleString();

        Promise.all([
            fetch('/api/reports/student-statistics/', { credentials: 'include' })
                .then(handleResponse),
            fetch('/api/students/', { credentials: 'include' })
                .then(handleResponse)
        ])
        .then(([statsData, studentsData]) => {
            renderReport(statsData, studentsData);
        })
        .catch(error => {
            console.error('Error loading report:', error);
            document.getElementById('report-container').innerHTML = `
                <div class="report-section text-center py-5">
                    <h4 class="text-danger"><i class="icofont-warning"></i> Error Loading Report</h4>
                    <p class="text-muted">${error.message}</p>
                    <button class="btn btn-main mt-3" onclick="location.reload()">Retry</button>
                </div>
            `;
        });
    });

    function renderReport(stats, students) {
        const container = document.getElementById('report-container');

        // Calculate percentages
        const total = stats.total_students || 0;
        const active = stats.active_students || 0;
        const graduated = stats.graduated_students || 0;
        const inactive = total - active - graduated;

        container.innerHTML = `
            <!-- Summary Stats -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-chart-bar-graph"></i> Overview</div>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="number">${total}</div>
                        <p class="label">Total Students</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: #28a745;">${active}</div>
                        <p class="label">Active Students</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: #17a2b8;">${graduated}</div>
                        <p class="label">Graduated</p>
                    </div>
                    <div class="stat-box">
                        <div class="number" style="color: var(--secondary-color);">${inactive}</div>
                        <p class="label">Inactive</p>
                    </div>
                </div>
            </div>

            <!-- Status Distribution -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-pie-chart"></i> Student Status Distribution</div>
                ${total > 0 ? `
                    <div style="margin-bottom: 8px;">
                        <span>Active</span>
                        <div class="progress-custom">
                            <div class="progress-bar" style="width: ${(active/total*100).toFixed(1)}%; background: #28a745;">${(active/total*100).toFixed(1)}%</div>
                        </div>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <span>Graduated</span>
                        <div class="progress-custom">
                            <div class="progress-bar" style="width: ${(graduated/total*100).toFixed(1)}%; background: #17a2b8;">${(graduated/total*100).toFixed(1)}%</div>
                        </div>
                    </div>
                    <div style="margin-bottom: 8px;">
                        <span>Inactive</span>
                        <div class="progress-custom">
                            <div class="progress-bar" style="width: ${(inactive/total*100).toFixed(1)}%; background: var(--secondary-color);">${(inactive/total*100).toFixed(1)}%</div>
                        </div>
                    </div>
                ` : '<p class="text-muted">No student data available</p>'}
            </div>

            <!-- By Course -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-book"></i> Students by Course</div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Course Name</th><th>Students</th><th>Percentage</th></tr>
                        </thead>
                        <tbody>
                            ${stats.by_course && stats.by_course.length > 0 ?
                                stats.by_course.map(c => `
                                    <tr>
                                        <td>${c.name}</td>
                                        <td><strong>${c.student_count || 0}</strong></td>
                                        <td>${total > 0 ? ((c.student_count/total)*100).toFixed(1) + '%' : '0%'}</td>
                                    </tr>
                                `).join('') :
                                '<tr><td colspan="3" class="text-center text-muted">No course data available</td></tr>'
                            }
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- By Status -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-check-circled"></i> Students by Status</div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Status</th><th>Count</th><th>Percentage</th></tr>
                        </thead>
                        <tbody>
                            ${stats.by_status && stats.by_status.length > 0 ?
                                stats.by_status.map(s => `
                                    <tr>
                                        <td><span class="badge-status ${s.status}">${s.status}</span></td>
                                        <td><strong>${s.count || 0}</strong></td>
                                        <td>${total > 0 ? ((s.count/total)*100).toFixed(1) + '%' : '0%'}</td>
                                    </tr>
                                `).join('') :
                                '<tr><td colspan="3" class="text-center text-muted">No status data available</td></tr>'
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function exportReport() {
        alert('Export functionality will be available soon.');
    }
</script>
{% endblock %}
