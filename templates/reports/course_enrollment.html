{% extends "base.html" %}
{% load static %}

{% block title %}Course Enrollment - GLIDE Institute{% endblock %}

{% block content %}
<style>
    .report-page {
        padding: 30px 0 60px;
        background: #f0f4f8;
        min-height: 100vh;
    }
    .report-header {
        background: linear-gradient(135deg, var(--primary-color) 0%, #1a2f4e 100%);
        padding: 30px 35px;
        border-radius: 15px;
        color: white;
        margin-bottom: 30px;
    }
    .report-header h3 { color: white; margin: 0; font-weight: 700; }
    .report-header h3 i { color: var(--secondary-color); margin-right: 12px; }
    .report-header .subtitle { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 5px; }
    .report-header .btn-white { background: white; color: var(--primary-color); padding: 8px 22px; border-radius: 50px; font-weight: 600; border: none; transition: all 0.3s ease; font-size: 14px; }
    .report-header .btn-white:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }

    .report-section {
        background: white;
        border-radius: 15px;
        padding: 25px 30px;
        margin-bottom: 25px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.04);
        border: 1px solid rgba(0,0,0,0.04);
    }
    .report-section .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #f0f0f0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .report-section .section-title i { color: var(--secondary-color); font-size: 20px; }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }
    .stat-box {
        background: var(--light-bg);
        border-radius: 12px;
        padding: 18px 20px;
        text-align: center;
    }
    .stat-box .number { font-size: 28px; font-weight: 700; color: var(--primary-color); }
    .stat-box .label { font-size: 13px; color: var(--text-color); margin: 0; }

    .table-responsive { overflow-x: auto; }
    .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    .table thead th {
        background: var(--light-bg);
        padding: 10px 12px;
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-color);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 2px solid var(--border-color);
    }
    .table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border-color); color: var(--text-dark); }
    .table tbody tr:hover { background: var(--light-bg); }

    .progress-custom {
        height: 20px;
        border-radius: 10px;
        background: #f0f0f0;
        overflow: hidden;
        position: relative;
    }
    .progress-custom .progress-bar {
        height: 100%;
        border-radius: 10px;
        transition: width 1s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        color: white;
    }

    @media (max-width: 768px) {
        .report-header { padding: 20px; text-align: center; }
        .report-section { padding: 15px; }
        .stat-grid { grid-template-columns: 1fr 1fr; }
        .stat-box .number { font-size: 22px; }
    }
    @media (max-width: 480px) {
        .stat-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="report-page">
    <div class="container">
        <div class="report-header">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h3><i class="icofont-book"></i> Course Enrollment Report</h3>
                    <p class="subtitle" id="report-date">Loading...</p>
                </div>
                <div class="col-md-4 text-md-right mt-3 mt-md-0">
                    <button class="btn btn-white" onclick="window.print()"><i class="icofont-print"></i> Print</button>
                    <button class="btn btn-white ml-2" onclick="exportReport()"><i class="icofont-file-excel"></i> Export</button>
                </div>
            </div>
        </div>

        <div id="report-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading enrollment data...</p>
            </div>
        </div>
    </div>
</div>

<script>
    function checkSession() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user || !user.id) {
            localStorage.clear();
            window.location.href = '/login/';
            return false;
        }
        return true;
    }

    function handleResponse(response) {
        if (response.status === 403) {
            return Promise.resolve({ results: [], count: 0 });
        }
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (!checkSession()) return;

        document.getElementById('report-date').textContent = 'Generated: ' + new Date().toLocaleString();

        fetch('/api/reports/course-enrollment/', { credentials: 'include' })
        .then(handleResponse)
        .then(data => {
            renderReport(data);
        })
        .catch(error => {
            console.error('Error loading report:', error);
            document.getElementById('report-container').innerHTML = `
                <div class="report-section text-center py-5">
                    <h4 class="text-danger"><i class="icofont-warning"></i> Error Loading Report</h4>
                    <p class="text-muted">${error.message}</p>
                    <button class="btn btn-main mt-3" onclick="location.reload()">Retry</button>
                </div>
            `;
        });
    });

    function renderReport(data) {
        const container = document.getElementById('report-container');

        const totalStudents = data.reduce((sum, c) => sum + (c.student_count || 0), 0);
        const totalClasses = data.reduce((sum, c) => sum + (c.class_count || 0), 0);
        const avgPerCourse = data.length > 0 ? Math.round(totalStudents / data.length) : 0;

        container.innerHTML = `
            <!-- Summary Stats -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-chart-bar-graph"></i> Enrollment Overview</div>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="number">${totalStudents}</div>
                        <p class="label">Total Enrollments</p>
                    </div>
                    <div class="stat-box">
                        <div class="number">${data.length}</div>
                        <p class="label">Total Courses</p>
                    </div>
                    <div class="stat-box">
                        <div class="number">${totalClasses}</div>
                        <p class="label">Total Classes</p>
                    </div>
                    <div class="stat-box">
                        <div class="number">${avgPerCourse}</div>
                        <p class="label">Avg Students per Course</p>
                    </div>
                </div>
            </div>

            <!-- Enrollment Table -->
            <div class="report-section">
                <div class="section-title"><i class="icofont-list"></i> Course Enrollment Details</div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Course Name</th><th>Code</th><th>Students</th><th>Classes</th><th>Avg per Class</th><th>% of Total</th></tr>
                        </thead>
                        <tbody>
                            ${data && data.length > 0 ?
                                data.map(c => {
                                    const percentage = totalStudents > 0 ? Math.round((c.student_count/totalStudents)*100) : 0;
                                    return `
                                        <tr>
                                            <td><strong>${c.name}</strong></td>
                                            <td>${c.code}</td>
                                            <td><strong>${c.student_count || 0}</strong></td>
                                            <td>${c.class_count || 0}</td>
                                            <td>${c.class_count > 0 ? Math.round((c.student_count/c.class_count)) : 0}</td>
                                            <td>
                                                <div class="progress-custom" style="height: 15px;">
                                                    <div class="progress-bar" style="width: ${percentage}%; background: ${getColor(percentage)};">
                                                        ${percentage}%
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    `;
                                }).join('') :
                                '<tr><td colspan="6" class="text-center text-muted">No course data available</td></tr>'
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    function getColor(percentage) {
        if (percentage >= 20) return '#28a745';
        if (percentage >= 10) return '#ffc107';
        return '#fd7e14';
    }

    function exportReport() {
        alert('Export functionality will be available soon.');
    }
</script>
{% endblock %}
